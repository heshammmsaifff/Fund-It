<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundIt – Admin Dashboard</title>
    <link rel="stylesheet" href="../shared/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page">
      <div class="dash-header">
        <div>
          <h1 class="section-title">Admin Dashboard</h1>
          <p class="text-muted">Manage users, campaigns, and platform data.</p>
        </div>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="dash-tabs">
        <button
          class="tab-btn active"
          id="tabUsers"
          onclick="switchTab('users')"
        >
          Users
        </button>
        <button
          class="tab-btn"
          id="tabCampaigns"
          onclick="switchTab('campaigns')"
        >
          Campaigns
        </button>
        <button class="tab-btn" id="tabPledges" onclick="switchTab('pledges')">
          Pledges
        </button>
      </div>

      <div id="usersPanel"></div>
      <div id="campaignsPanel" style="display: none"></div>
      <div id="pledgesPanel" style="display: none"></div>
    </div>

    <script src="../shared/api.js"></script>
    <script src="index.js"></script>
  </body>
</html>
