<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundIt – Campaign Details</title>
    <link rel="stylesheet" href="../shared/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page">
      <div id="alertBox"></div>
      <div id="content"></div>
    </div>

    <!-- PLEDGE MODAL -->
    <div id="pledgeModal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <h3 class="modal-title">Support this Campaign</h3>
        <div id="pledgeAlert"></div>
        <div class="form-group">
          <label>Pledge Amount ($)</label>
          <input
            type="number"
            id="pledgeAmount"
            placeholder="e.g. 50"
            min="1"
          />
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="confirmPledge()">
            Confirm Pledge
          </button>
        </div>
      </div>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="paymentModal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <h3 class="modal-title">Payment Confirmation</h3>
        <p id="paymentMsg" class="text-muted" style="margin-bottom: 20px"></p>
        <div class="form-group">
          <label>Card Number</label>
          <input
            type="text"
            id="cardNumber"
            placeholder="1234 5678 9012 3456"
            maxlength="19"
          />
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>Expiry</label>
            <input
              type="text"
              id="cardExpiry"
              placeholder="MM/YY"
              maxlength="5"
            />
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="text" id="cardCvv" placeholder="123" maxlength="3" />
          </div>
        </div>
        <div id="paymentAlert"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closePayment()">
            Cancel
          </button>
          <button class="btn btn-success" onclick="processPledge()">
            Pay Now
          </button>
        </div>
      </div>
    </div>

    <script src="../shared/api.js"></script>
    <script src="index.js"></script>
  </body>
</html>
